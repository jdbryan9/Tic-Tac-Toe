<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Vibrant Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css?v=20260318" />
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>✨ Tic-Tac-Toe</h1>
      <p class="subtitle">A vibrant classic with modern flair, computer opponent, and the latest blue-to-gold theme.</p>

      <div class="mode-wrap">
        <label for="gameMode">Game Mode</label>
        <select id="gameMode" aria-label="Select game mode">
          <option value="human" selected>Two Players</option>
          <option value="computer">Vs Computer</option>
        </select>
      </div>

      <div id="difficultyWrap" class="mode-wrap hidden" aria-hidden="true">
        <label for="difficultyLevel">Difficulty</label>
        <select id="difficultyLevel" aria-label="Select computer difficulty">
          <option value="easy" selected>Easy</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="status-wrap">
        <p id="status" class="status" aria-live="polite">Player X's turn</p>
      </div>

      <div class="board" role="grid" aria-label="Tic-Tac-Toe board">
        <button class="cell" data-index="0" aria-label="Cell 1"></button>
        <button class="cell" data-index="1" aria-label="Cell 2"></button>
        <button class="cell" data-index="2" aria-label="Cell 3"></button>
        <button class="cell" data-index="3" aria-label="Cell 4"></button>
        <button class="cell" data-index="4" aria-label="Cell 5"></button>
        <button class="cell" data-index="5" aria-label="Cell 6"></button>
        <button class="cell" data-index="6" aria-label="Cell 7"></button>
        <button class="cell" data-index="7" aria-label="Cell 8"></button>
        <button class="cell" data-index="8" aria-label="Cell 9"></button>
      </div>

      <div class="controls">
        <button id="resetBtn" class="reset-btn">🔁 New Game</button>
      </div>

      <div class="scoreboard" aria-label="Game scores">
        <article class="score x-score">
          <h2>X Wins</h2>
          <p id="xScore">0</p>
        </article>
        <article class="score draw-score">
          <h2>Draws</h2>
          <p id="drawScore">0</p>
        </article>
        <article class="score o-score">
          <h2>O Wins</h2>
          <p id="oScore">0</p>
        </article>
      </div>
    </section>
  </main>

  <script src="script.js?v=20260318"></script>
</body>
</html>
